name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify bundled plugin runtime is current
        run: git diff --exit-code -- plugins/play-agent/plugin-runtime/play-agent-mcp.mjs
      - run: npm test
